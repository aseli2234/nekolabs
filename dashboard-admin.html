<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🛠️ Admin Panel - Nekolabs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="https://i.pinimg.com/736x/8d/a4/6a/8da46a2e9e9e9e9e9e9e9e9e9e9e9e9e.jpg" alt="Nekolabs Logo">
      <span>Nekolabs</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="mods.html" class="nav-link">📂 Mods</a>
      <a href="chat.html" class="nav-link">🤖 Chat AI</a>
      <a href="downloader.html" class="nav-link">📥 Downloader</a>
      <span class="nav-user">👑 Admin</span>
      <a href="dashboard-admin.html" class="nav-btn nav-btn-outline">🛠️ Admin</a>
      <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main style="padding: 100px 24px 60px;">
    <div class="container">
      <h1 style="font-family:'Poppins',sans-serif; font-size:2em; margin-bottom:24px;">
        🛠️ <span class="text-gradient">Admin Panel</span>
      </h1>

      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" onclick="showTab('users')">👥 Users</button>
        <button class="tab" onclick="showTab('mods')">📂 Mods</button>
      </div>

      <!-- TAB USERS -->
      <div id="tab-users">
        <div id="userList" style="display:flex; flex-direction:column; gap:12px;">
          <p style="text-align:center; color:var(--text-secondary);">⏳ Memuat user...</p>
        </div>
      </div>

      <!-- TAB MODS -->
      <div id="tab-mods" style="display:none;">
        
        <!-- FORM UPLOAD MOD (ADMIN) -->
        <div class="card-glass" style="padding:24px; margin-bottom:24px;">
          <h3 style="margin-bottom:16px;">📤 Upload Mod (Admin)</h3>
          <form id="adminUploadForm">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px;">
              <div class="form-group">
                <label>📛 Nama Mod</label>
                <input type="text" id="adminModName" class="form-input" placeholder="Nama mod..." required>
              </div>
              <div class="form-group">
                <label>📂 Kategori</label>
                <select id="adminModCategory" class="form-input" required>
                  <option value="action">🎮 Action</option>
                  <option value="rpg">⚔️ RPG</option>
                  <option value="adventure">🗺️ Adventure</option>
                  <option value="simulation">🏡 Simulation</option>
                  <option value="racing">🏎️ Racing</option>
                  <option value="horror">👻 Horror</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>📝 Deskripsi</label>
              <input type="text" id="adminModDesc" class="form-input" placeholder="Deskripsi singkat...">
            </div>
            <div class="form-group">
              <label>🔗 Link Download</label>
              <input type="url" id="adminModLink" class="form-input" placeholder="https://www.mediafire.com/..." required>
            </div>
            <div class="form-group">
              <label>🔒 Password (opsional)</label>
              <input type="text" id="adminModPassword" class="form-input" placeholder="Kosongkan kalau tidak ada">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">📤 Upload Mod</button>
          </form>
          <div id="adminUploadMessage" style="margin-top:16px; text-align:center;"></div>
        </div>

        <!-- DAFTAR MOD -->
        <h3 style="margin-bottom:16px;">📂 Semua Mod</h3>
        <div id="adminModList" style="display:flex; flex-direction:column; gap:12px;">
          <p style="text-align:center; color:var(--text-secondary);">⏳ Memuat mod...</p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('nekolabs_user');
      location.href = 'index.html';
    }
  </script>
</body>
</html>
