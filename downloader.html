<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📥 Downloader - Nekolabs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="https://i.pinimg.com/736x/8d/a4/6a/8da46a2e9e9e9e9e9e9e9e9e9e9e9e9e.jpg" alt="Nekolabs Logo">
      <span>Nekolabs</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="mods.html" class="nav-link">📂 Mods</a>
      <a href="chat.html" class="nav-link">🤖 Chat AI</a>
      <a href="downloader.html" class="nav-link active">📥 Downloader</a>
      <a href="contact.html" class="nav-link">📞 Kontak</a>
      <a href="login.html" class="nav-btn nav-btn-outline">🔑 Masuk</a>
      <a href="register.html" class="nav-btn nav-btn-primary">📝 Daftar</a>
    </div>
  </nav>

  <!-- MAIN -->
  <main style="padding: 100px 24px 60px;">
    <div class="container" style="max-width:700px;">
      <h1 style="font-family:'Poppins',sans-serif; font-size:2em; margin-bottom:8px; text-align:center;">
        📥 <span class="text-gradient">Downloader</span>
      </h1>
      <p style="text-align:center; color:var(--text-secondary); margin-bottom:30px;">
        Download video dari TikTok & Instagram dengan mudah
      </p>

      <!-- INPUT -->
      <div class="card-glass" style="padding:24px; margin-bottom:24px;">
        <div style="display:flex; gap:10px;">
          <input type="text" id="urlInput" class="form-input" placeholder="https://vt.tiktok.com/... atau https://www.instagram.com/..." style="flex:1;">
          <button onclick="downloadVideo()" class="btn btn-primary">🚀 Download</button>
        </div>
      </div>

      <!-- RESULT -->
      <div id="resultBox"></div>
    </div>
  </main>

  <!-- FLOATING CONTACT -->
  <a href="contact.html" class="floating-contact" title="Hubungi Admin">📞</a>

  <script src="js/downloader.js"></script>
  <script>
    (function() {
      const user = JSON.parse(localStorage.getItem('nekolabs_user') || 'null');
      const nav = document.getElementById('navLinks');
      if (!nav || !user) return;

      if (user.role === 'admin') {
        nav.innerHTML = `
          <a href="mods.html" class="nav-link">📂 Mods</a>
          <a href="chat.html" class="nav-link">🤖 Chat AI</a>
          <a href="downloader.html" class="nav-link active">📥 Downloader</a>
          <a href="contact.html" class="nav-link">📞 Kontak</a>
          <span class="nav-user">👑 ${user.username}</span>
          <a href="dashboard-admin.html" class="nav-btn nav-btn-outline">🛠️ Admin</a>
          <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
        `;
      } else {
        nav.innerHTML = `
          <a href="mods.html" class="nav-link">📂 Mods</a>
          <a href="chat.html" class="nav-link">🤖 Chat AI</a>
          <a href="downloader.html" class="nav-link active">📥 Downloader</a>
          <a href="contact.html" class="nav-link">📞 Kontak</a>
          <span class="nav-user">👤 ${user.username}</span>
          ${user.premium ? '<span class="badge badge-premium">💎 Premium</span>' : ''}
          <a href="dashboard-user.html" class="nav-btn nav-btn-outline">📂 Dashboard</a>
          <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
        `;
      }
    })();

    function logout() {
      localStorage.removeItem('nekolabs_user');
      location.reload();
    }
  </script>
</body>
</html>
