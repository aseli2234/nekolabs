<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📂 File Library - Nekolabs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="https://i.pinimg.com/736x/8d/a4/6a/8da46a2e9e9e9e9e9e9e9e9e9e9e9e9e.jpg" alt="Nekolabs Logo">
      <span>Nekolabs</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="mods.html" class="nav-link active">📂 Mods</a>
      <a href="chat.html" class="nav-link">🤖 Chat AI</a>
      <a href="downloader.html" class="nav-link">📥 Downloader</a>
      <a href="login.html" class="nav-btn nav-btn-outline">🔑 Masuk</a>
      <a href="register.html" class="nav-btn nav-btn-primary">📝 Daftar</a>
    </div>
  </nav>

  <!-- MAIN CONTENT -->
  <main style="padding: 100px 24px 60px;">
    <div class="container">
      
      <!-- HEADER -->
      <h1 style="font-family:'Poppins',sans-serif; font-size:2em; margin-bottom:8px;">
        📂 <span class="text-gradient">File Library</span>
      </h1>
      <p style="color:var(--text-secondary); margin-bottom:24px;">
        Koleksi mod game dari berbagai kategori
      </p>

      <!-- SEARCH & FILTER -->
      <div style="display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap;">
        <input type="text" id="searchInput" class="form-input" placeholder="🔍 Cari mod..." style="flex:1; min-width:200px;">
        <select id="categoryFilter" class="form-input" style="max-width:180px;">
          <option value="all">📂 Semua</option>
          <option value="action">🎮 Action</option>
          <option value="rpg">⚔️ RPG</option>
          <option value="adventure">🗺️ Adventure</option>
          <option value="simulation">🏡 Simulation</option>
          <option value="racing">🏎️ Racing</option>
          <option value="horror">👻 Horror</option>
        </select>
      </div>

      <!-- MOD LIST -->
      <div class="grid grid-3" id="modList">
        <p style="grid-column:1/-1; text-align:center; color:var(--text-secondary);">⏳ Memuat mod...</p>
      </div>

    </div>
  </main>

  <!-- MODAL DETAIL -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="modalTitle">📦 Mod Detail</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <p id="modalDesc" style="color:var(--text-secondary); margin-bottom:16px;"></p>
      <div id="modalPasswordBox" style="display:flex; gap:8px; margin-bottom:16px;">
        <input type="text" id="modalPassword" class="form-input" readonly placeholder="Tidak ada password">
        <button class="btn btn-outline btn-sm" onclick="copyPassword()">📋 Salin</button>
      </div>
      <a id="modalLink" href="#" target="_blank" class="btn btn-primary" style="width:100%;">📥 Download</a>
    </div>
  </div>

  <script src="js/mods.js"></script>
  <script>
    // Update navbar
    (function() {
      const user = JSON.parse(localStorage.getItem('nekolabs_user') || 'null');
      const nav = document.getElementById('navLinks');
      if (!nav || !user) return;

      if (user.role === 'admin') {
        nav.innerHTML = `
          <a href="mods.html" class="nav-link active">📂 Mods</a>
          <a href="chat.html" class="nav-link">🤖 Chat AI</a>
          <a href="downloader.html" class="nav-link">📥 Downloader</a>
          <span class="nav-user">👑 ${user.username}</span>
          <a href="dashboard-admin.html" class="nav-btn nav-btn-outline">🛠️ Admin</a>
          <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
        `;
      } else {
        nav.innerHTML = `
          <a href="mods.html" class="nav-link active">📂 Mods</a>
          <a href="chat.html" class="nav-link">🤖 Chat AI</a>
          <a href="downloader.html" class="nav-link">📥 Downloader</a>
          <span class="nav-user">👤 ${user.username}</span>
          ${user.premium ? '<span class="badge badge-premium">💎 Premium</span>' : ''}
          <a href="dashboard-user.html" class="nav-btn nav-btn-outline">📂 Dashboard</a>
          <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
        `;
      }
    })();

    function logout() {
      localStorage.removeItem('nekolabs_user');
      location.reload();
    }
  </script>
</body>
</html>
