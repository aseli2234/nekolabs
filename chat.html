<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🤖 AI Chat - Nekolabs</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar" id="navbar">
    <a href="index.html" class="nav-brand">
      <img src="https://i.pinimg.com/736x/8d/a4/6a/8da46a2e9e9e9e9e9e9e9e9e9e9e9e9e.jpg" alt="Nekolabs Logo">
      <span>Nekolabs</span>
    </a>
    <div class="nav-links" id="navLinks">
      <a href="mods.html" class="nav-link">📂 Mods</a>
      <a href="chat.html" class="nav-link active">🤖 Chat AI</a>
      <a href="downloader.html" class="nav-link">📥 Downloader</a>
      <a href="login.html" class="nav-btn nav-btn-outline">🔑 Masuk</a>
      <a href="register.html" class="nav-btn nav-btn-primary">📝 Daftar</a>
    </div>
  </nav>

  <!-- CHAT LAYOUT -->
  <div class="chat-layout">
    
    <!-- SIDEBAR -->
    <aside class="chat-sidebar" id="chatSidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">👥 Karakter</span>
        <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
      </div>
      <div class="char-list" id="charList"></div>
    </aside>

    <!-- CHAT MAIN -->
    <main class="chat-main">
      <!-- HEADER -->
      <div class="chat-header">
  <button class="toggle-sidebar" onclick="toggleSidebar()">☰</button>
  <span class="chat-header-avatar" id="currentAvatar">🌸</span>
  <span class="chat-header-name" id="currentName">Elaina</span>
  <button onclick="clearChat()" style="margin-left:auto; background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:6px 12px; border-radius:50px; cursor:pointer; font-size:0.85em;">🗑️ Hapus Chat</button>
</div>

      <!-- MESSAGES -->
      <div class="chat-messages" id="chatMessages">
        <div class="message bot">
          🌸 Hai! Aku Elaina, penyihir dari Wandering Witch. Ada yang bisa kubantu?
        </div>
      </div>

      <!-- INPUT -->
      <div class="chat-input-area">
        <input type="text" class="chat-input" id="chatInput" placeholder="Ketik pesan..." onkeypress="if(event.key==='Enter') sendMessage()">
        <button class="btn-mode" onclick="toggleModePopup()" id="btnMode">🌟 Mode</button>
        <button class="btn-send" onclick="sendMessage()">Kirim</button>

        <!-- MODE POPUP -->
        <div class="mode-popup" id="modePopup">
          <button class="mode-option active" onclick="selectMode('normal')">🌟 Normal</button>
          <button class="mode-option" onclick="selectMode('romantic')" id="modeRomantic">💕 Romantic</button>
          <button class="mode-option" onclick="selectMode('adult')" id="modeAdult">🔞 Adult</button>
        </div>
      </div>
    </main>
  </div>

  <script src="js/chat.js"></script>
  <script>
    // Update navbar
    (function() {
      const user = JSON.parse(localStorage.getItem('nekolabs_user') || 'null');
      const nav = document.getElementById('navLinks');
      if (!nav || !user) return;

      if (user.role === 'admin') {
        nav.innerHTML = `
          <a href="mods.html" class="nav-link">📂 Mods</a>
          <a href="chat.html" class="nav-link active">🤖 Chat AI</a>
          <a href="downloader.html" class="nav-link">📥 Downloader</a>
          <span class="nav-user">👑 ${user.username}</span>
          <a href="dashboard-admin.html" class="nav-btn nav-btn-outline">🛠️ Admin</a>
          <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
        `;
      } else {
        nav.innerHTML = `
          <a href="mods.html" class="nav-link">📂 Mods</a>
          <a href="chat.html" class="nav-link active">🤖 Chat AI</a>
          <a href="downloader.html" class="nav-link">📥 Downloader</a>
          <span class="nav-user">👤 ${user.username}</span>
          ${user.premium ? '<span class="badge badge-premium">💎 Premium</span>' : ''}
          <a href="dashboard-user.html" class="nav-btn nav-btn-outline">📂 Dashboard</a>
          <a href="#" onclick="logout()" class="nav-btn nav-btn-primary">🚪 Keluar</a>
        `;
      }
    })();

    function logout() {
      localStorage.removeItem('nekolabs_user');
      location.reload();
    }
  </script>
</body>
</html>
